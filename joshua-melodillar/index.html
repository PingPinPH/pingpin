<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Jeremy Louie Caraan | PingPin</title>
    <style>
        /* Modern Minimalist Aesthetic */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px 25px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            text-align: center; 
            width: 85%;
            max-width: 340px; 
        }
        /* 1. Avatar on Top */
        .avatar { 
            width: 130px; 
            height: 130px;
            border-radius: 50%; 
            object-fit: cover;
            border: 5px solid #000;
            margin-bottom: 25px;
        }
        /* 2. Name */
        h1 { 
            font-size: 1.5rem; 
            margin: 0; 
            color: #1a1a1a;
            font-weight: 700;
        }
        /* 3. Company | Position */
        .work-info { 
            color: #555; 
            font-size: 0.95rem;
            margin: 8px 0 25px;
            font-weight: 500;
        }
        /* 4 & 5. Contact Details */
        .contact-row {
            font-size: 0.9rem;
            color: #333;
            margin: 5px 0;
            display: block;
            text-decoration: none;
        }
        .contact-row:hover {
            color: #000;
            font-weight: bold;
        }
        /* Button */
        .btn { 
            background-color: #000; 
            color: white; 
            padding: 16px 20px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 600; 
            display: block;
            margin-top: 30px;
            transition: 0.2s ease;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .footer {
            margin-top: 30px;
            font-size: 0.65rem;
            color: #bbb;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="avatar.jpg" alt="Joshua Melodillar” class="avatar">
        
        <h1>Jeremy Louie Caraan</h1>
        
        <p class="work-info">PingPin PH | Co-Founder</p>
        
        <a href="tel:+639491190722” class="contact-row">+63 994 119 0722</a>
        
        <a href="mailto:joshuamelodillar01@gmail.com” class="contact-row">joshuamelodillar01@gmail.com</a>

        <a href="contact.vcf" class="btn">Add to Contacts</a>

        <div class="footer">PingPin Pro</div>
    </div>

</body>
</html>
